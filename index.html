<!doctype html>
<html lang="zh-TW">
<head>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/HUHuHuuHOuO/click@main/%E6%BA%AB%E6%B3%892.png">
    <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/HUHuHuuHOuO/click@main/%E6%B5%81%E5%BF%832.png">
    <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/HUHuHuuHOuO/click@main/%E6%BA%8F%E5%BF%83.png">
    <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/HUHuHuuHOuO/click@main/%E5%81%8F%E7%86%9F2.png">
    <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/HUHuHuuHOuO/click@main/%E9%81%8E%E7%86%9F.png">
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>完美煮蛋定時器 - 國際防當機版</title>

    <link href="https://cdn.jsdelivr.net/npm/@fontsource/nunito@latest/index.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bg: '#FDFBF7', yolk: '#FFB300', text: '#4A4A4A', shadow: '#D1CFC7' },
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                },
            },
        };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { background-color: #e5e5e5; min-height: 100vh; margin: 0; font-family: 'Nunito', sans-serif; overflow: hidden; user-select: none; -webkit-user-select: none; }
        #app-shell { background-color: #fdfbf7; width: 100%; height: 100vh; height: 100dvh; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        @media (min-width: 1025px) { body { display: flex; justify-content: center; align-items: center; } #app-shell { width: 480px; height: 640px; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border: 8px solid #fdfbf7; } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .neu-flat { background: #fdfbf7; box-shadow: 6px 6px 12px #d1cfc7, -6px -6px 12px #ffffff; border-radius: 16px; }
        .neu-pressed { background: #fdfbf7; box-shadow: inset 4px 4px 8px #d1cfc7, inset -4px -4px 8px #ffffff; border-radius: 16px; }
        .neu-btn:active:not(:disabled) { box-shadow: inset 3px 3px 6px #d1cfc7, inset -3px -3px 6px #ffffff; transform: scale(0.95); }
        .neu-primary { background: linear-gradient(145deg, #ffc107, #ffb300); box-shadow: 6px 6px 12px #d99800, -6px -6px 12px #ffeeb3; color: white; }
        .progress-ring__circle { transform: rotate(-90deg); transform-origin: 50% 50%; }
        @keyframes bg-flash { 0%, 100% { background-color: #fdfbf7; } 50% { background-color: #ffe0b2; } }
        .alarm-state { animation: bg-flash 1s infinite; }
        @keyframes bg-flash-blue { 0%, 100% { background-color: #fdfbf7; } 50% { background-color: #bfdbfe; } }
        .alarm-state-blue { animation: bg-flash-blue 1s infinite; }
        .egg-figure-preview { width: 44px; height: 58px; object-fit: cover; border-radius: 26px; border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .selected-egg { border-color: #ffb300; transform: scale(1.15); box-shadow: 0 10px 15px -3px rgba(255, 179, 0, 0.3); background: white; }
        #doneness-container { display: flex; justify-content: center; align-items: center; gap: 0.75rem; min-width: 100%; }
        .real-egg-shape { border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; background: linear-gradient(135deg, #fff9f0 0%, #f7e8d0 100%); position: relative; box-shadow: inset -4px -6px 12px rgba(0, 0, 0, 0.05), 2px 4px 8px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; }
        button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; outline: none; }
        .pointer-events-none { pointer-events: none; }

        .header-action-btn { border: 2px solid transparent; transition: all 0.2s ease; }
        @media (hover: hover) and (pointer: fine) {
            .header-action-btn:hover { border-color: #FFB300; color: #FFB300; }
        }
        .header-action-btn:active { border-color: #FFB300; color: #FFB300; transform: scale(0.95); }

        .recipe-card { border: 2px solid transparent; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @media (hover: hover) and (pointer: fine) {
            .recipe-card:hover { border-color: #FFB300; }
        }
        .recipe-card:active { border-color: #FFB300; transform: scale(0.98); }
    </style>
</head>
<body>
    <div id="app-shell">
        <header class="pt-6 px-6 flex-none flex justify-between items-center z-20">
            <h1 class="text-xl font-black tracking-wider text-gray-600" data-i18n="appTitle">完美鷄蛋</h1>
            <div class="flex gap-2">
                <button onclick="openSettings()" class="neu-flat header-action-btn px-3 py-2 flex items-center gap-1.5 text-gray-500">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                    <span class="text-[11px] font-bold tracking-wider" data-i18n="settings">設定</span>
                </button>
                <button onclick="openRecipeCollection()" class="neu-flat header-action-btn px-3 py-2 flex items-center gap-1.5 text-gray-500">
                    <i data-lucide="book-open" class="w-4 h-4"></i>
                    <span class="text-[11px] font-bold tracking-wider" data-i18n="moreRecipes">更多蛋料理</span>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto hide-scrollbar px-6 pt-4 pb-4 relative w-full">
            <div id="settings-panel" class="space-y-6 transition-all duration-500">
                <div class="grid grid-cols-2 gap-4">
                    <div class="neu-flat p-3 flex flex-col items-center justify-center cursor-pointer neu-btn h-24" onclick="toggleTemp()">
                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider" data-i18n="initTemp">初始溫度</span>
                        <div class="flex items-center gap-2 text-yolk font-bold mt-1">
                            <i id="icon-temp" data-lucide="snowflake" class="w-6 h-6"></i>
                            <span id="text-temp" class="text-lg" data-i18n="fridge">冷藏</span>
                        </div>
                    </div>
                    <div class="neu-flat p-3 flex flex-col items-center justify-center cursor-pointer neu-btn h-24" onclick="toggleSizeDetail()">
                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider" data-i18n="eggSize">雞蛋規格</span>
                        <div class="flex items-center gap-2 text-yolk font-bold mt-1">
                            <span id="text-size-main" class="text-2xl uppercase">M</span>
                            <span id="text-size-sub" class="text-sm text-gray-400">(53-63g)</span>
                        </div>
                    </div>
                </div>

                <div class="neu-flat p-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider" data-i18n="stoveWatt">爐灶瓦數</span>
                        <span id="wattage-display" class="text-xs font-bold text-yolk bg-yolk/10 px-2 py-1 rounded">2000W</span>
                    </div>
                    <input type="range" min="1000" max="3000" step="100" value="2000" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-yolk" oninput="updateWattage(this.value)">
                </div>

                <div class="space-y-3">
                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider px-1" data-i18n="targetDoneness">目標熟度</span>
                    <div class="neu-pressed py-6 px-2 overflow-x-auto hide-scrollbar">
                        <div id="doneness-container"></div>
                    </div>
                    <div class="text-center h-14 flex flex-col justify-center">
                        <h2 id="doneness-big-title" class="text-2xl font-black text-yolk">溏心 (Jammy)</h2>
                        <p id="doneness-sub-desc" class="text-xs text-gray-400">蛋黃呈膏狀，中心微流</p>
                    </div>
                    <div id="tips-panel" class="px-1 mt-4"></div>
                </div>
            </div>

            <div class="mt-4 flex items-center justify-center gap-3 relative w-full">
                <button id="btn-minus" disabled class="neu-flat w-12 h-12 rounded-full flex items-center justify-center text-gray-400 opacity-50 cursor-not-allowed transition-all duration-300 shrink-0 neu-btn">
                    <i data-lucide="minus" class="w-6 h-6 pointer-events-none"></i>
                </button>
                
                <div class="relative w-64 h-64 flex items-center justify-center shrink-0">
                    <svg id="timer-svg" class="absolute inset-0 w-full h-full drop-shadow-2xl" viewBox="0 0 140 140">
                        <circle class="text-gray-200" stroke-width="6" stroke="currentColor" fill="transparent" r="64" cx="70" cy="70" />
                        <circle id="progress-ring" class="progress-ring__circle text-yolk" stroke-width="6" stroke-linecap="round" stroke="currentColor" fill="transparent" r="64" cx="70" cy="70" style="color: #FFB300;" />
                        <circle id="overtime-ring" class="progress-ring__circle opacity-0" stroke-width="6" stroke-linecap="round" stroke="currentColor" fill="transparent" r="64" cx="70" cy="70" style="color: #60A5FA;" />
                    </svg>

                    <div id="tracker-container" class="absolute inset-0 pointer-events-none z-20 flex items-center justify-center origin-center" style="transition: transform 0.1s linear;">
                        <div class="absolute" style="transform: translateY(-117px);">
                            <div id="tracker-icon-bg" class="bg-white rounded-full p-[4px] border-2 shadow-md flex items-center justify-center" style="transition: transform 0.1s linear, border-color 0.2s ease, color 0.2s ease;">
                                <i data-lucide="flame" id="tracker-icon-flame" class="w-4 h-4"></i>
                                <i data-lucide="snowflake" id="tracker-icon-snow" class="w-4 h-4 hidden"></i>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col items-center z-10 text-center">
                        <div id="timer-display" class="text-6xl font-black text-gray-700 tracking-tighter tabular-nums transition-colors duration-300">06:30</div>
                        <div id="timer-status" class="text-xs font-bold text-yolk mt-3 bg-white/80 px-4 py-1.5 rounded-full backdrop-blur-sm shadow-sm transition-all duration-300">水開後放入</div>
                    </div>
                </div>

                <button id="btn-plus" disabled class="neu-flat w-12 h-12 rounded-full flex items-center justify-center text-gray-400 opacity-50 cursor-not-allowed transition-all duration-300 shrink-0 neu-btn">
                    <i data-lucide="plus" class="w-6 h-6 pointer-events-none"></i>
                </button>
            </div>
        </main>

        <div id="settings-modal" class="absolute inset-0 z-[70] bg-black/50 hidden items-center justify-center transition-opacity duration-300 opacity-0 px-6">
            <div class="bg-white w-full max-w-sm rounded-3xl p-6 flex flex-col transform scale-95 transition-transform duration-300 shadow-2xl" id="settings-modal-content">
                <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-3">
                    <h3 class="font-black text-xl text-gray-800 flex items-center gap-2">
                        <i data-lucide="settings" class="w-6 h-6 text-yolk"></i> <span data-i18n="settingsTitle">設定</span>
                    </h3>
                    <button onclick="closeSettings()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-600 header-action-btn">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="space-y-6">
                    <div>
                        <h4 class="text-sm font-bold text-gray-500 mb-3 flex items-center gap-2">
                            <i data-lucide="globe" class="w-4 h-4"></i> <span data-i18n="language">語言 (Language)</span>
                        </h4>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="changeLanguage('tw')" id="btn-lang-tw" class="lang-btn py-2 rounded-xl text-xs font-bold border-2 border-yolk bg-yolk/10 text-yolk">繁體中文</button>
                            <button onclick="changeLanguage('yue')" id="btn-lang-yue" class="lang-btn py-2 rounded-xl text-xs font-bold border-2 border-transparent bg-gray-50 text-gray-600 hover:bg-gray-100">粵語</button>
                            <button onclick="changeLanguage('en')" id="btn-lang-en" class="lang-btn py-2 rounded-xl text-xs font-bold border-2 border-transparent bg-gray-50 text-gray-600 hover:bg-gray-100">English</button>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-gray-100">
                        <button onclick="triggerIceWaterTest()" class="w-full neu-flat p-4 rounded-xl flex items-center justify-center gap-2 text-blue-500 font-bold active:scale-95 transition-transform bg-blue-50 hover:bg-blue-100">
                            <i data-lucide="bug-play" class="w-5 h-5"></i>
                            <span data-i18n="testMode">🛠️ 測試：過冷水模式</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="size-modal-overlay" class="absolute inset-0 bg-black/20 backdrop-blur-[2px] z-40 hidden transition-opacity duration-300 opacity-0" onclick="toggleSizeDetail()"></div>
        <div id="size-modal" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[40px] z-50 p-8 shadow-2xl modal-closed transition-transform duration-300 transform translate-y-full">
            <h3 class="text-center font-black text-gray-600 mb-8 tracking-widest uppercase text-sm" data-i18n="selectSizeModal">選擇雞蛋規格</h3>
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div onclick="selectSize('s')" class="size-option flex flex-col items-center gap-4 p-4 rounded-3xl transition-all cursor-pointer"><div class="real-egg-shape border border-orange-100" style="width: 3.4rem; height: 4.4rem"></div><span class="font-black text-xl">S</span></div>
                <div onclick="selectSize('m')" class="size-option flex flex-col items-center gap-4 p-4 rounded-3xl transition-all cursor-pointer neu-pressed"><div class="real-egg-shape border border-orange-100" style="width: 3.9rem; height: 5.1rem; background: linear-gradient(135deg, #FFB300 0%, #FF8F00 100%);"></div><span class="font-black text-xl">M</span></div>
                <div onclick="selectSize('l')" class="size-option flex flex-col items-center gap-4 p-4 rounded-3xl transition-all cursor-pointer"><div class="real-egg-shape border border-orange-100" style="width: 4.4rem; height: 5.8rem"></div><span class="font-black text-xl">L</span></div>
            </div>
            <button onclick="toggleSizeDetail()" class="neu-primary w-full h-14 rounded-2xl font-bold tracking-widest active:scale-95 transition-transform" data-i18n="confirm">確認</button>
        </div>

        <div class="flex-none px-8 py-6 bg-bg z-30 shrink-0">
            <button id="main-btn" onclick="toggleTimer()" class="neu-primary w-full h-16 rounded-2xl text-xl font-bold tracking-widest flex items-center justify-center gap-3 shadow-xl transition-all active:scale-95">
                <i id="main-btn-icon" data-lucide="play" fill="currentColor"></i><span id="main-btn-text" data-i18n="startCooking">開始煮</span>
            </button>
        </div>

        <div id="recipe-collection" class="absolute inset-0 z-[55] bg-bg hidden flex-col overflow-hidden">
            <div class="pt-6 px-6 pb-4 flex items-center justify-between bg-bg/90 backdrop-blur sticky top-0 z-10">
                <button onclick="closeRecipeCollection()" class="neu-flat header-action-btn w-10 h-10 flex items-center justify-center text-gray-600"><i data-lucide="chevron-down" class="w-6 h-6"></i></button>
                <h2 class="text-lg font-black text-gray-700" data-i18n="recipeInspo">蛋料理靈感</h2>
                <button onclick="openHelpModal()" class="neu-flat header-action-btn w-10 h-10 flex items-center justify-center text-gray-600">
                    <i data-lucide="help-circle" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6 pb-20">
                <div class="neu-flat p-3 flex items-center gap-3">
                    <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
                    <input type="text" id="search-input" data-i18n="searchPlaceholder" placeholder="搜尋食譜..." class="bg-transparent flex-1 outline-none text-sm text-gray-600" onclick="playClickSound()" oninput="searchRecipes(this.value)">
                </div>
                <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-2">
                    <button onclick="filterRecipes('all')" class="filter-btn px-4 py-2 bg-yolk text-white rounded-full text-xs font-bold whitespace-nowrap shadow-md" data-i18n="all">全部</button>
                    <button onclick="filterRecipes('chinese')" class="filter-btn px-4 py-2 bg-white text-gray-600 rounded-full text-xs font-bold whitespace-nowrap shadow-sm border" data-i18n="chinese">中式</button>
                    <button onclick="filterRecipes('western')" class="filter-btn px-4 py-2 bg-white text-gray-600 rounded-full text-xs font-bold whitespace-nowrap shadow-sm border" data-i18n="western">西式</button>
                    <button onclick="filterRecipes('japanese')" class="filter-btn px-4 py-2 bg-white text-gray-600 rounded-full text-xs font-bold whitespace-nowrap shadow-sm border" data-i18n="japanese">日式</button>
                    <button onclick="filterRecipes('korean')" class="filter-btn px-4 py-2 bg-white text-gray-600 rounded-full text-xs font-bold whitespace-nowrap shadow-sm border" data-i18n="korean">韓式</button>
                </div>
                <div id="recipe-list" class="grid grid-cols-1 gap-4"></div>
            </div>
        </div>

        <div id="recipe-detail-modal" class="absolute inset-0 z-[60] bg-black/50 hidden items-end justify-center transition-opacity duration-300 opacity-0">
            <div class="bg-white w-full rounded-t-3xl h-[90vh] flex flex-col transform translate-y-full transition-transform duration-300" id="recipe-detail-content">
                <div class="relative h-48 shrink-0">
                    <img id="detail-image" src="" class="w-full h-full object-cover rounded-t-3xl">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent rounded-t-3xl"></div>
                    <button onclick="closeRecipeDetail()" class="absolute top-4 right-4 w-10 h-10 bg-black/30 rounded-full flex items-center justify-center text-white header-action-btn"><i data-lucide="x"></i></button>
                    <div class="absolute bottom-4 left-6 text-white">
                        <span id="detail-tag" class="px-2 py-0.5 bg-yolk text-black text-[10px] font-bold rounded mb-2 inline-block"></span>
                        <h2 id="detail-title" class="text-2xl font-black"></h2>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto p-6 space-y-6">
                    <p id="detail-desc" class="text-gray-600 text-sm"></p>
                    <div class="neu-flat p-4 flex flex-col items-center justify-center gap-3 bg-gray-50 cursor-pointer" onclick="playRecipeVideo()">
                        <div class="w-full aspect-video bg-black/10 rounded-xl flex items-center justify-center relative overflow-hidden group">
                            <img id="detail-video-thumb" src="" class="w-full h-full object-cover opacity-80">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="w-14 h-14 bg-white/50 backdrop-blur rounded-full flex items-center justify-center transition-transform group-active:scale-90"><i data-lucide="play" class="w-6 h-6 text-yolk ml-1"></i></div>
                            </div>
                        </div>
                        <p class="text-[10px] text-gray-500 font-bold" data-i18n="watchVideo">點擊觀看演示影片</p>
                    </div>
                    <div><h3 class="font-bold mb-3 text-gray-800 flex items-center gap-2"><i data-lucide="shopping-basket" class="w-4 h-4 text-yolk"></i> <span data-i18n="ingredients">食材準備</span></h3><ul id="detail-ingredients" class="text-sm text-gray-600 grid grid-cols-2 gap-2"></ul></div>
                    <div><h3 class="font-bold mb-3 text-gray-800 flex items-center gap-2"><i data-lucide="list-ordered" class="w-4 h-4 text-yolk"></i> <span data-i18n="steps">烹飪步驟</span></h3><div id="detail-steps" class="text-sm text-gray-600 space-y-4"></div></div>
                    
                    <div class="neu-flat p-4 border-t-4 border-t-yolk mt-6 mb-8">
                        <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 bg-yolk rounded-full flex items-center justify-center text-white"><i data-lucide="bot" class="w-5 h-5"></i></div>
                                <h3 class="font-bold text-gray-800" data-i18n="aiAssistant">智慧廚藝助手</h3>
                            </div>
                            
                            <div class="flex items-center gap-2 flex-wrap justify-end">
                                <button onclick="toggleAIModel()" class="flex items-center gap-1 bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-xs font-bold transition-all active:scale-95 shadow-sm border border-gray-200 w-[125px]">
                                    <img id="ai-model-icon" src="https://cdn.jsdelivr.net/gh/HUHuHuuHOuO/click@main/puter%20AI.png" class="w-4 h-4 object-contain shrink-0" alt="AI Icon">
                                    <span id="ai-model-text" class="flex-1 text-center truncate">Puter</span>
                                    <i data-lucide="refresh-cw" class="w-3 h-3 text-gray-400 shrink-0"></i>
                                </button>
                                
                                <button onclick="toggleAIMode()" class="flex items-center justify-center gap-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-xs font-bold transition-all active:scale-95 shadow-sm border border-gray-200 w-[100px]">
                                    <span id="mode-icon" class="text-sm shrink-0">👨‍🍳</span>
                                    <span id="mode-text" class="flex-1 text-center truncate" data-i18n="chefMode">大廚模式</span>
                                </button>
                            </div>
                        </div>

                        <div id="ai-chat-history" class="text-xs text-gray-600 mb-4 max-h-40 overflow-y-auto space-y-2 leading-relaxed bg-white p-3 rounded-xl border border-gray-100">
                        </div>
                        <div class="flex gap-2 mb-3 overflow-x-auto hide-scrollbar">
                            <button onclick="sendJoke()" class="shrink-0 px-3 py-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-600 rounded-full text-[10px] font-bold transition-all active:scale-95 shadow-sm" data-i18n="joke">😂 講個笑話</button>
                            <button onclick="sendSecret()" class="shrink-0 px-3 py-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-600 rounded-full text-[10px] font-bold transition-all active:scale-95 shadow-sm" data-i18n="secret">🤫 不敗秘訣</button>
                        </div>

        function calculateTime() {
            let time = BASE_TIMES[STATE.doneness];
            if (STATE.temp === 'room') time -= 60;
            if (STATE.size === 's') time -= 30;
            if (STATE.size === 'l') time += 30;
            const wattageFactor = 2000 / STATE.wattage;
            return Math.max(Math.round(time * wattageFactor), 60);
        }

        const COOL_BLUE_PALETTE = ['#71B2FF', '#0029C4', '#3A8AFA', '#1651FA', '#28B8FF', '#007DCC', '#0050B3', '#003B73', '#002171', '#001CB8'];
        const HOT_RED_PALETTE = ['#FFB300', '#F97316', '#EA580C', '#DC2626', '#B91C1C', '#991B1B', '#7F1D1D', '#450A0A', '#000000', '#4A4A4A'];

        function getColor(lap) {
            if (lap === 1 && !STATE.iceWaterMode) {
                if (STATE.timeLeft <= 10 && STATE.running) return '#EF4444'; 
                if (STATE.timeLeft <= 60 && STATE.running) return '#F97316'; 
                return '#FFB300'; 
            }
            if (lap === 1 && STATE.iceWaterMode) {
                if (STATE.timeLeft <= 10 && STATE.running) return '#3730A3'; 
                return '#71B2FF'; 
            }
            const palette = STATE.iceWaterMode ? COOL_BLUE_PALETTE : HOT_RED_PALETTE;
            const idx = (lap - 1) % palette.length;
            return palette[idx];
        }

        function updateTimerDisplay() {
            const m = Math.floor(STATE.timeLeft / 60).toString().padStart(2, '0');
            const s = (STATE.timeLeft % 60).toString().padStart(2, '0');
            const timerDisplay = document.getElementById('timer-display');
            if(timerDisplay) timerDisplay.innerText = `${m}:${s}`;
            
            const circumference = 64 * 2 * Math.PI;
            const svg = document.getElementById('timer-svg');
            let totalLaps = Math.max(Math.ceil(STATE.timeLeft / STATE.totalTime), 1);

            while (svg.children.length <= totalLaps) {
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('class', 'progress-ring__circle');
                circle.setAttribute('stroke-width', '6');
                circle.setAttribute('stroke-linecap', 'round');
                circle.setAttribute('stroke', 'currentColor');
                circle.setAttribute('fill', 'transparent');
                circle.setAttribute('r', '64');
                circle.setAttribute('cx', '70');
                circle.setAttribute('cy', '70');
                circle.style.strokeDasharray = `${circumference} ${circumference}`;
                circle.style.strokeDashoffset = circumference;
                circle.style.opacity = '0'; 
                svg.appendChild(circle);
            }

            for (let i = 1; i < svg.children.length; i++) {
                const circle = svg.children[i];
                const lapIndex = i; 
                circle.style.transition = 'stroke-dashoffset 0.1s linear, opacity 0.1s ease, color 0.2s ease';
                circle.style.color = getColor(lapIndex);
                let lapProgress = (STATE.timeLeft / STATE.totalTime) - (lapIndex - 1);
                
                if (lapProgress <= 0) {
                    circle.style.strokeDashoffset = circumference; circle.style.opacity = '0'; 
                } else if (lapProgress >= 1) {
                    circle.style.strokeDashoffset = 0; circle.style.opacity = '1';
                } else {
                    circle.style.strokeDashoffset = circumference - (lapProgress * circumference); circle.style.opacity = '1';
                }
            }

            if(timerDisplay) timerDisplay.style.color = getColor(totalLaps);

            let angle = (STATE.timeLeft / STATE.totalTime) * 360;
            const trackerContainer = document.getElementById('tracker-container');
            const trackerIconBg = document.getElementById('tracker-icon-bg');
            if (trackerContainer && trackerIconBg) {
                trackerContainer.style.transform = `rotate(${angle}deg)`;
                trackerIconBg.style.transform = `rotate(${-angle}deg)`;
                const currentColor = getColor(totalLaps);
                trackerIconBg.style.borderColor = currentColor;
                trackerIconBg.style.color = currentColor;
            }
        }

        function updateCalculation() {
            if (STATE.running) return;
            const time = calculateTime();
            STATE.totalTime = time; 
            STATE.timeLeft = time;
            updateTimerDisplay();
            updateDynamicTexts();
        }

            const boilingAudio = document.getElementById('boiling-audio');

            boilingAudio.pause(); boilingAudio.currentTime = 0;

            const alarmAudio = document.getElementById('alarm-audio');
            alarmAudio.currentTime = 0; alarmAudio.play().catch(e => console.log(e));
            
            const btnMinus = document.getElementById('btn-minus');

            btnMinus.disabled = true; btnPlus.disabled = true;
            btnMinus.classList.add('opacity-50', 'cursor-not-allowed');

        function doTimerTick() {
            STATE.timeLeft--;

            if (STATE.timeLeft === 10) {
                const cdAudio = document.getElementById('countdown-audio');
                cdAudio.currentTime = 0; cdAudio.play().catch(e => console.log(e));

            if (STATE.timeLeft <= 0) {

            }
        }

        window.adjustTime = (seconds) => {
            if (!STATE.running) return;
            
            const oldTime = STATE.timeLeft;
            STATE.timeLeft += seconds;
            
            if (oldTime > 10 && STATE.timeLeft <= 10 && STATE.timeLeft > 0) {
                const cdAudio = document.getElementById('countdown-audio');
                cdAudio.currentTime = 0; 
                cdAudio.play().catch(e => console.log(e));
            }

            if (STATE.timeLeft <= 0) {
                STATE.timeLeft = 0;
                updateTimerDisplay();
                window.triggerFinish(); 
                return;
            }
            
            updateTimerDisplay(); 
        };

        function setupHoldButtons() {
            const btnMinus = document.getElementById('btn-minus');
            const btnPlus = document.getElementById('btn-plus');
            function startAdjusting(amount) {
                if (!STATE.running) return;
                playClickSound(); adjustTime(amount); 
                holdTimeout = setTimeout(() => { holdInterval = setInterval(() => { adjustTime(amount); }, 50); }, 400); 
            }
            function stopAdjusting() { clearTimeout(holdTimeout); clearInterval(holdInterval); }
            const addHoldListeners = (btn, amount) => {
                btn.addEventListener('mousedown', (e) => { if(e.button === 0 && !btn.disabled) startAdjusting(amount); });
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); if(!btn.disabled) startAdjusting(amount); }, {passive: false});
                btn.addEventListener('mouseup', stopAdjusting);
                btn.addEventListener('mouseleave', stopAdjusting);
                btn.addEventListener('touchend', (e) => { e.preventDefault(); stopAdjusting(); }, {passive: false});
            };
            addHoldListeners(btnMinus, -10); addHoldListeners(btnPlus, 10);
        }

            const msg = lang === 'en' ? `Switched to [${nextModel.name}] engine! 🚀` : 
                        lang === 'yue' ? `轉咗去【${nextModel.name}】大腦引擎！🚀` : 
                        `已切換至【${nextModel.name}】大腦引擎！🚀`;
                        
            history.innerHTML += `<div class="mt-2 text-blue-500"><b>System：</b><span class="text-gray-700">${msg}</span></div>`;
            history.scrollTop = history.scrollHeight;
        };

        window.toggleAIMode = () => {
            playClickSound();
            const history = document.getElementById('ai-chat-history');
            const icon = document.getElementById('mode-icon');
            const text = document.getElementById('mode-text');
            const lang = STATE.lang;

            if (STATE.currentMode === "chef") {
                STATE.currentMode = "grandma";
                icon.innerText = "👵"; text.innerText = I18N[lang].grandmaMode;
                history.innerHTML += `<div class="mt-2 text-yolk"><b>System：</b><span class="text-gray-700">${I18N[lang].aiSystemGrandma}</span></div>`;
            } else {
                STATE.currentMode = "chef";
                icon.innerText = "👨‍🍳"; text.innerText = I18N[lang].chefMode;
                history.innerHTML += `<div class="mt-2 text-yolk"><b>System：</b><span class="text-gray-700">${I18N[lang].aiSystemChef}</span></div>`;
            }
            history.scrollTop = history.scrollHeight;
        };

        window.sendJoke = () => {
            playClickSound();
            document.getElementById('ai-input').value = STATE.lang === 'en' ? "Tell me a joke!" : "講個笑話";
            window.askAI();
        };

        window.sendSecret = () => {
            playClickSound();
            document.getElementById('ai-input').value = STATE.lang === 'en' ? "What's the secret tip for this?" : "有咩不敗秘訣？";
            window.askAI();
        };

        const LOCAL_EGG_BRAIN = {
            "zh-TW": {
                "grandma": {
                    "溫泉": "溫泉蛋的秘訣是『低溫慢煮』。最完美的溫度是 65°C 到 68°C，煮大約 30 到 45 分鐘喔！",
                    "溏心": "溏心蛋的重點是『水滾後下鍋』！煮 6 到 6.5 分鐘，起鍋後『立刻泡冰水』喔！",
                    "剝殼": "煮完的蛋『一定要馬上泡冰水』！熱脹冷縮會讓蛋膜和蛋殼分離，水裡剝更容易！",
                    "預設": "乖孫，雖然現在網路有點連不上大腦，但煮蛋最重要的就是『時間』和『溫度』，乖乖顧火喔！"
                },
                "chef": {
                    "預設": "網路連線異常，但請記住：精準控制溫度與時間，是完美蛋料理的唯一法則。"
                }
            },
            "yue": {
                "grandma": { "預設": "乖孫，依家網路好似塞車，但煮蛋最緊要就係『時間』同『溫度』！" },
                "chef": { "預設": "網絡連線異常，但請記住：精準控制溫度與時間，係完美蛋料理嘅唯一法則。" }
            },
            "en": {
                "grandma": { "預設": "Sweetie, the network is a bit busy, but cooking eggs is all about time and temperature!" },
                "chef": { "預設": "Network error. But remember: precise temperature and time control is the golden rule." }
            }
        };

        window.askAI = async () => {
            playClickSound(); 
            const input = document.getElementById('ai-input');
            const history = document.getElementById('ai-chat-history');
            const q = input.value.trim();
            if(!q) return;

            history.innerHTML += `<div class="mt-2 text-right"><span class="bg-yolk/10 p-2 rounded-lg inline-block text-gray-800"><b>You：</b>${q}</span></div>`;
            input.value = '';
            
            const loadingId = 'loading-' + Date.now();
            const aiName = STATE.currentMode === "grandma" ? (STATE.lang==='en'?"Granny":"阿嫲") : (STATE.lang==='en'?"Chef":"大廚");
            const thinkingArray = STATE.currentMode === "grandma" ? thinkingSentencesGrandma[STATE.lang] : thinkingSentencesChef[STATE.lang];

            history.innerHTML += `<div id="${loadingId}" class="mt-2 text-yolk"><b>${aiName}：</b><span class="text-gray-700">${thinkingArray[0]}</span></div>`;
            history.scrollTop = history.scrollHeight;

            const currentRecipe = document.getElementById('detail-title').innerText;
            const textSpan = document.getElementById(loadingId).querySelector('span');

            let sentenceIndex = 0;
            const thinkingInterval = setInterval(() => {
                sentenceIndex = (sentenceIndex + 1) % thinkingArray.length;
                textSpan.innerText = thinkingArray[sentenceIndex];
            }, 1000);

            let systemContent = "";
            if (STATE.currentMode === "grandma") {
                if (STATE.lang === "en") systemContent = "You are an expert egg chef acting like a loving grandmother. Call user 'Sweetie'. Max 2-3 short sentences. No Markdown.";
                else if (STATE.lang === "yue") systemContent = "你係精通蛋料理嘅五星級大廚，靈魂係錫孫嘅阿婆。請用澳門/香港廣東話口語字回答。開頭叫「乖孫」。最多2到3句！嚴禁Markdown。";
                else systemContent = "你是一位精通蛋料理的五星級大廚，靈魂是疼愛後輩的阿嬤。用繁體中文回答，開頭稱呼「乖孫」。最多2到3句，嚴禁Markdown。";
            } else {
                if (STATE.lang === "en") systemContent = "You are a professional egg chef. Tone: professional, confident. Max 2-3 short sentences. No Markdown.";
                else if (STATE.lang === "yue") systemContent = "你係專業五星級大廚。語氣專業、自信。請用澳門/香港廣東話口語字回答。最多2到3句！嚴禁Markdown。";
                else systemContent = "你是一位精通蛋料理的專業五星級大廚。用繁體中文回答。最多2到3句，絕對禁止使用Markdown。";
            }

            try {
                let aiText = "";
                
                if (STATE.aiModel === 'puter') {
                    if (typeof puter === 'undefined') throw new Error("Puter 尚未載入");
                    const fullPrompt = `${systemContent}\n現在正在看的菜是：「${currentRecipe}」。\n使用者問：${q}\n請以${aiName}的身分回答。`;
                    const response = await puter.ai.chat(fullPrompt);
                    aiText = response.toString();
                } 
                else if (STATE.aiModel === 'gemini' || STATE.aiModel === 'pollination') {
                    const targetModel = STATE.aiModel === 'gemini' ? 'gemini' : 'mistral'; 
                    
                    // 🌟 阿嬤特調終極版：使用 Pollinations 的正規 OpenAI 相容通道 🌟
                    const res = await fetch('https://text.pollinations.ai/openai', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            model: targetModel,
                            messages: [
                                { role: "system", content: systemContent },
                                { role: "user", content: `現在正在看的菜是：「${currentRecipe}」。\n使用者問：${q}\n請以${aiName}的身分回答。` }
                            ]
                        })
                    });
                    
                    if (!res.ok) throw new Error(`${STATE.aiModel} API 呼叫失敗，狀態碼: ${res.status}`);
                    
                    // 🌟 正確拆開 AI 回傳的 JSON 包裹 🌟
                    const data = await res.json();
                    if (data && data.choices && data.choices.length > 0) {
                        aiText = data.choices[0].message.content;
                    } else {
                        throw new Error("AI 回傳的資料格式有誤");
                    }
                }

                clearInterval(thinkingInterval); 
                textSpan.innerHTML = `<span class="text-gray-700">${aiText}</span>`;
                
                window.chatMemory = window.chatMemory || [];
                window.chatMemory.push({ role: "user", content: q }); 
                window.chatMemory.push({ role: "assistant", content: aiText });
                
            } catch (error) {
                console.error("AI 連線失敗:", error);
                clearInterval(thinkingInterval); 
                
                const currentLang = STATE.lang || "zh-TW";
                const currentMode = STATE.currentMode || "grandma";
                let db = LOCAL_EGG_BRAIN[currentLang] ? LOCAL_EGG_BRAIN[currentLang][currentMode] : LOCAL_EGG_BRAIN["zh-TW"]["grandma"];
                
                let answer = "";
                for (const keyword in db) {
                    if (q.includes(keyword)) {
                        answer = db[keyword];
                        break;
                    }
                }
                if (!answer) answer = db["預設"];
                
                textSpan.innerHTML = `<span class="text-gray-700">${answer}</span>`;
            }
            history.scrollTop = history.scrollHeight;
        };


        window.toggleTimer = () => {
            if (STATE.running && STATE.iceWaterMode) { resetApp(); return; }
            playClickSound(); 
            const lang = STATE.lang;
            const btnMinus = document.getElementById('btn-minus');
            const btnPlus = document.getElementById('btn-plus');
            const alarmAudio = document.getElementById('alarm-audio');
            const boilingAudio = document.getElementById('boiling-audio'); 
            const iceAudio = document.getElementById('ice-water-audio');
            
            if (STATE.running) {
                clearInterval(timerInterval); STATE.running = false;
                document.getElementById('main-btn').innerHTML = `<i data-lucide="play" fill="currentColor"></i><span id="main-btn-text">${I18N[lang].startCooking}</span>`;
                document.getElementById('main-btn').style.background = '';
                
                const d = DONENESS_DATA[STATE.doneness];
                document.getElementById('timer-status').innerText = T(d.action);
                
                boilingAudio.pause(); boilingAudio.currentTime = 0;
                iceAudio.pause(); iceAudio.currentTime = 0;

                btnMinus.disabled = true; btnPlus.disabled = true;
                btnMinus.classList.add('opacity-50', 'cursor-not-allowed');
                btnPlus.classList.add('opacity-50', 'cursor-not-allowed');
                safeCreateIcons(); updateCalculation();
            } else {
                STATE.running = true;
                document.getElementById('main-btn').innerHTML = `<i data-lucide="square" fill="currentColor"></i><span id="main-btn-text">${I18N[lang].stopCooking}</span>`;
                document.getElementById('main-btn').style.background = '#FF7043';
                document.getElementById('timer-status').innerText = I18N[lang].cooking;

                boilingAudio.volume = 0.5; boilingAudio.play().catch(e => console.log(e));
                alarmAudio.volume = 0; alarmAudio.play().then(() => { alarmAudio.pause(); alarmAudio.currentTime = 0; alarmAudio.volume = 1; }).catch(e => console.log(e));
                
                btnMinus.disabled = false; btnPlus.disabled = false;
                btnMinus.classList.remove('opacity-50', 'cursor-not-allowed');
                btnPlus.classList.remove('opacity-50', 'cursor-not-allowed');
                
                safeCreateIcons();
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(doTimerTick, 1000);
            }
        };

        window.startIceWater = () => {
            playClickSound();
            const lang = STATE.lang;
            document.getElementById('finish-overlay').classList.add('hidden');
            document.getElementById('finish-overlay').classList.remove('flex');
            document.getElementById('app-shell').classList.remove('alarm-state');
            document.getElementById('tracker-icon-flame').classList.add('hidden');
            document.getElementById('tracker-icon-snow').classList.remove('hidden');

            const alarmAudio = document.getElementById('alarm-audio');
            alarmAudio.pause(); alarmAudio.currentTime = 0;

            STATE.iceWaterMode = true; STATE.timeLeft = 180; STATE.totalTime = 180;

            const boilingAudio = document.getElementById('boiling-audio');
            boilingAudio.pause(); boilingAudio.currentTime = 0;
            const iceAudio = document.getElementById('ice-water-audio');
            iceAudio.volume = 0.5; iceAudio.play().catch(e => console.log(e));

            document.getElementById('timer-status').innerText = I18N[lang].iceCooling;
            document.getElementById('timer-status').classList.replace('text-yolk', 'text-blue-500');
            document.getElementById('main-btn').innerHTML = `<i data-lucide="square" fill="currentColor"></i><span id="main-btn-text">${I18N[lang].stopCooking}</span>`;
            document.getElementById('main-btn').style.background = '#3B82F6'; 
            
            const btnMinus = document.getElementById('btn-minus');
            const btnPlus = document.getElementById('btn-plus');
            btnMinus.disabled = false; btnPlus.disabled = false;
            btnMinus.classList.remove('opacity-50', 'cursor-not-allowed');
            btnPlus.classList.remove('opacity-50', 'cursor-not-allowed');
            
            updateTimerDisplay(); safeCreateIcons();
            
            STATE.running = true;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(doTimerTick, 1000);
        };

        window.resetApp = () => {
            playClickSound(); 
            const lang = STATE.lang;
            const appShell = document.getElementById('app-shell');
            appShell.classList.remove('alarm-state', 'alarm-state-blue');
            document.getElementById('tracker-icon-flame').classList.remove('hidden');
            document.getElementById('tracker-icon-snow').classList.add('hidden');
            
            const finishOverlay = document.getElementById('finish-overlay');
            finishOverlay.classList.add('hidden'); finishOverlay.classList.remove('flex');
            
            ['alarm-audio', 'boiling-audio', 'ice-water-audio', 'countdown-audio'].forEach(id => {
                const au = document.getElementById(id); au.pause(); au.currentTime = 0;
            });
            
            if (timerInterval) clearInterval(timerInterval);
            STATE.iceWaterMode = false; STATE.running = false;
            
            document.getElementById('timer-status').classList.replace('text-blue-500', 'text-yolk');
            finishOverlay.classList.replace('bg-blue-500/95', 'bg-yolk/95');
            document.getElementById('btn-ice-water').classList.remove('hidden');
            
            document.getElementById('main-btn').innerHTML = `<i data-lucide="play" fill="currentColor"></i><span id="main-btn-text">${I18N[lang].startCooking}</span>`;
            document.getElementById('main-btn').style.background = '';
            
            const btnMinus = document.getElementById('btn-minus');
            const btnPlus = document.getElementById('btn-plus');
            btnMinus.disabled = true; btnPlus.disabled = true;
            btnMinus.classList.add('opacity-50', 'cursor-not-allowed');
            btnPlus.classList.add('opacity-50', 'cursor-not-allowed');
            
            updateCalculation(); safeCreateIcons();
        };

        window.handleTipClick = (recipeId, ytLink, fallbackId) => {
            playClickSound();
            if (recipeId === null && ytLink === null && fallbackId === null) return; 
            if (recipeId && RECIPES.some(r => r.id === recipeId)) { openRecipeDetail(recipeId); } 
            else if (ytLink && ytLink !== 'null') { window.open(ytLink, '_blank'); } 
            else if (fallbackId && RECIPES.some(r => r.id === fallbackId)) { openRecipeDetail(fallbackId); } 
            else { openRecipeCollection(); }
        };

        window.renderTips = (idx) => {
            const container = document.getElementById('tips-panel');
            if (!container) return; 
            const d = DONENESS_DATA[idx];
            const tips = d.tips;
            const lang = STATE.lang;

            container.innerHTML = `
                <div class="p-2 rounded-3xl neu-flat bg-bg border border-shadow space-y-1">
                    ${tips.map(tip => {
                        const rId = tip.recipeId !== null ? tip.recipeId : 'null';
                        const yLink = tip.ytLink ? "'" + tip.ytLink + "'" : 'null';
                        const fId = tip.fallbackId !== null ? tip.fallbackId : 'null';
                        return `
                        <div onclick="handleTipClick(${rId}, ${yLink}, ${fId})" class="rounded-2xl p-4 flex items-center gap-4 cursor-pointer hover:brightness-95 active:scale-95 transition-all" style="background-color: ${d.tipBackgroundColor};">
                            <div class="text-5xl shrink-0">${tip.emoji}</div>
                            <div class="text-white text-xs font-semibold leading-relaxed flex-1">${T(tip.desc)}</div>
                            ${(tip.recipeId !== null || tip.ytLink || tip.fallbackId !== null) ? '<i data-lucide="chevron-right" class="w-5 h-5 text-white/50 shrink-0"></i>' : ''}
                        </div>
                        `;
                    }).join('')}
                </div>
            `;
            safeCreateIcons(); 
        };

        function preloadRecipeImages() {
            RECIPES.forEach(recipe => { if (recipe.image) { const img = new Image(); img.src = recipe.image; } });
        }
        setTimeout(preloadRecipeImages, 1000);

        init();
    </script>
</body>
</html>
